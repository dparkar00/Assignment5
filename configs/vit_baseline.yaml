# Plain ViT baseline
# Parameter count with these settings: 12,052,036 trainable params
# Difference from primary (Swin) model: 9.28% (required: <= 10%) --
# recomputed against Swin's current 13,284,499 params (after the
# patch_size/depth changes documented in configs/primary.yaml's revision
# history). The original 1.02% figure was against Swin's Part 2 parameter
# count (12,176,830) before those architecture changes and is now stale.
# Found via grid search over embed_dim/depth/num_heads -- see the
# parameter-matching search in the Part 2 conversation history, or rerun:
#   python -c "from src.models import *; ..." to reproduce the search.
# Trained from random initialization -- no pretrained weights are loaded
# anywhere in src/models.py or src/train.py (Part 2 requirement).
#
# Hyperparameters below were revised after the first 100-epoch run showed
# even worse overfitting than Swin (98.6% train acc vs 60.5% val acc) --
# this baseline previously had ZERO dropout/stochastic depth, unlike Swin's
# 0.1 drop_path_rate, which plausibly explains the gap. Added regularization
# here; also picked up the shared changes (MixUp/CutMix, stronger
# RandAugment, higher weight decay, longer training) that must match
# configs/primary.yaml under "Experimental Controls" below. dropout/
# drop_path_rate are architecture-specific and NOT required to match Swin's.
#
# SHARED-SETTING CHANGE (v8): learning_rate 0.001 -> 0.0005.
# Swin plateaued at ~68.8% val across three genuinely different
# architectures (v5/v6/v7 in configs/primary.yaml's revision history),
# each landing within 0.1 points of each other despite real structural
# differences -- strong evidence architecture was no longer the limiting
# factor. The shared training recipe (this LR included) was set early and
# never revisited as the architecture grew substantially deeper. The
# original Swin paper's LR recipe (1e-3) is calibrated for batch_size=1024
# via linear LR scaling; at our batch_size=256, that scaling implies
# ~2.5e-4, a 4x difference from what we'd been using. Halving to 5e-4 (not
# jumping straight to 2.5e-4) tests the hypothesis without overcorrecting,
# since CIFAR-scale from-scratch training often tolerates higher LR than
# ImageNet-calibrated recipes suggest. This requires retraining BOTH models
# and must be applied identically to both, per "Experimental Controls".
# RESULT: confirmed the hypothesis on BOTH models -- Swin val 68.8% (approx
# plateau) -> 70.28%, ViT val 66.32% -> 67.86%. Real, cross-model effect.
#
# SHARED-SETTING CHANGE (v9): learning_rate 0.0005 -> 0.00025. v8 only
# tested the halfway point toward the literature-implied value (2.5e-4);
# since that direction clearly helped both models, this tests the actual
# linear-scaling target rather than a second, smaller step in the same
# direction. Real risk: too-low LR converges more slowly and may not fully
# exploit the fixed 150-epoch budget -- this is a genuine test, not a
# guaranteed win. Evaluated on VALIDATION accuracy only.
# RESULT: worse than v8. Swin val 70.28% (v8) -> 69.44% (v9) -- the
# predicted risk materialized: LR fully decays to ~0 by epoch ~145 with
# val flat at 69.3-69.4%, i.e. genuinely converged, just to a lower point,
# not "still improving, needs more epochs." Three LR data points now
# bracket a real optimum: 1e-3 (~68.8%) -> 5e-4 (70.28%, best) -> 2.5e-4
# (69.44%) -- an inverted-U, with 5e-4 closer to the sweet spot than either
# direction tested.
#
# SHARED-SETTING CHANGE (v10): two changes bundled into one run, since
# neither has actually been trained yet:
#   (a) learning_rate 0.00025 -> 0.0005, reverting to v8's empirically-
#       better value. Selected on VALIDATION accuracy alone (70.28% >
#       69.44% for Swin), consistent with every prior decision in this
#       project.
#   (b) weight_decay 0.08 -> 0.12. Targets generalization directly (unlike
#       LR, which targets fit quality) -- see configs/primary.yaml for the
#       full reasoning.
# RESULT: net negative for Swin on validation alone (69.48% < v8's
# 70.28%). ViT baseline roughly flat (67.94% vs 67.86% val). See
# configs/primary.yaml for the full result and the v11 change below.
#
# SHARED-SETTING CHANGE (v11): weight_decay 0.12 -> 0.08 (revert,
# validation-justified) and warmup_epochs 5 -> 10 (untested lever --
# see configs/primary.yaml for the full reasoning).
# RESULT: best result yet at the time (Swin val 70.54%, test 69.20%).
#
# v12 was Swin-architecture-only (drop_path_rate), not applicable here --
# see configs/primary.yaml.
#
# CONSIDERED, THEN SWAPPED OUT (would-be v13): warmup_epochs 10 -> 15.
# Deferred in favor of testing dropout first (Swin-architecture-only, not
# applicable to this baseline config) -- see configs/primary.yaml for the
# full reasoning. warmup_epochs remains at 10, unchanged this round.

model:
  name: vit
  input_resolution: 32
  patch_size: 4
  in_channels: 3
  embed_dim: 288
  depth: 12
  num_heads: 6
  mlp_ratio: 4.0
  dropout: 0.1
  drop_path_rate: 0.1
  num_classes: 100

# Must match configs/primary.yaml exactly (Part 2, "Experimental Controls").
data:
  data_root: ./data
  random_seed: 705643
  randaugment_num_ops: 2
  randaugment_magnitude: 12
  random_crop_padding: 4
  mixup_cutmix_enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  mixup_cutmix_prob: 0.5
  mixup_switch_prob: 0.5

training:
  batch_size: 256
  num_workers: 2
  random_seed: 705643
  epochs: 200
  optimizer: adamw
  learning_rate: 0.0005
  weight_decay: 0.08
  lr_schedule: cosine
  warmup_epochs: 15
  label_smoothing: 0.1
  grad_clip_norm: 1.0
  mixed_precision: true
  checkpoint_dir: ./checkpoints/vit_baseline
  log_path: ./logs/vit_training.csv
  wandb_project: cifar100-vit-swin
  wandb_run_name: vit-baseline