# Primary model: Swin Transformer
# Parameter count with these settings: 13,155,166 trainable params
# (9.15% above the ViT baseline's 12,052,036 -- within the required 10%)
# Trained from random initialization -- no pretrained weights are loaded
# anywhere in src/models.py or src/train.py (Part 2 requirement).
#
# Revision history:
#   v1 (100 epochs, no mixup): 94% train acc vs 59% val acc -- clear
#      overfitting. Added MixUp/CutMix, stronger RandAugment, weight decay,
#      stochastic depth, extended to 150 epochs (all shared with baseline).
#   v2 (150 epochs, dropout=0.1, drop_path=0.2): best val 61.3%, while the
#      *baseline* -- same augmentation/optimizer/schedule/duration, but
#      dropout=0.1/drop_path=0.1 -- reached 66.3% best val. Since every
#      shared (training-procedure) setting was identical between the two
#      runs, the gap points at Swin's regularization being stronger than
#      the baseline's despite Swin doing worse: not clearly overfitting
#      anymore (train_loss 1.90 vs val_loss 2.10, a modest gap), which
#      suggests dropout=0.1/drop_path=0.2 was limiting Swin's own fit more
#      than it needed to.
#   v3 (this version): drop_path_rate 0.2 -> 0.1 (now matches baseline,
#      removing that confound) and dropout 0.1 -> 0.05. Also mlp_ratio
#      4.0 -> 4.5 for a modest capacity increase -- this is the most
#      capacity that fits inside the required 10% parameter-match ceiling;
#      note that even one extra block in the deepest stage (depths (2,2,7))
#      alone overshoots to +15.76%, since that stage runs at 4x the base
#      embedding dimension. Only architecture-specific settings changed
#      here (dropout/drop_path_rate/mlp_ratio) -- everything in data:/
#      training: below is byte-identical to configs/vit_baseline.yaml,
#      unchanged, per "Experimental Controls".

model:
  name: swin
  input_resolution: 32
  patch_size: 4
  in_channels: 3
  window_size: 4
  embed_dim: 96
  num_stages: 3
  depths: [2, 2, 6]
  num_heads: [3, 6, 12]
  mlp_ratio: 4.5
  dropout: 0.05
  drop_path_rate: 0.1
  num_classes: 100

# Experimental controls shared with configs/vit_baseline.yaml -- both files
# must agree on everything below so the two runs are a fair comparison
# (Part 2, "Experimental Controls"). Unchanged from the previous run.
data:
  data_root: ./data
  random_seed: 705643
  randaugment_num_ops: 2
  randaugment_magnitude: 12
  random_crop_padding: 4
  mixup_cutmix_enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  mixup_cutmix_prob: 0.5
  mixup_switch_prob: 0.5

training:
  batch_size: 256
  num_workers: 2
  random_seed: 705643
  epochs: 150
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.08
  lr_schedule: cosine
  warmup_epochs: 5
  label_smoothing: 0.1
  grad_clip_norm: 1.0
  mixed_precision: true
  checkpoint_dir: ./checkpoints/primary
  log_path: ./logs/primary_training.csv
  wandb_project: cifar100-vit-swin
  wandb_run_name: swin-primary
