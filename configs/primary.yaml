# Primary model: Swin Transformer
# Parameter count with these settings: 13,284,499 trainable params
# 9.28% relative to primary (correct denominator per the assignment's
# wording, "within 10% of your primary model's parameter count" -- i.e.
# |ViT - Primary| / Primary <= 0.10, not divided by ViT). Solving for
# Primary given ViT is fixed at 12,052,036 gives a valid range of
# [10,956,396, 13,391,151]; 13,284,499 sits inside it.
# Trained from random initialization; no pretrained weights are loaded
# anywhere in src/models.py or src/train.py (Part 2 requirement).
#
# Revision history:
#   v1 (100 epochs, no mixup): 94% train acc vs 59% val acc -- overfitting.
#      Added MixUp/CutMix, stronger RandAugment, weight decay, stochastic
#      depth, extended to 150 epochs (all shared with baseline).
#   v2 (150 ep, dropout=0.1, drop_path=0.2, patch_size=4): best val 61.34%,
#      while baseline (identical training procedure, dropout/drop_path
#      0.1/0.1) reached 66.32%.
#   v3 (150 ep, dropout=0.05, drop_path=0.1, mlp_ratio=4.5, patch_size=4):
#      best val 61.36% -- a 0.02% change from v2. Ruled out
#      "over-regularized" as the bottleneck.
#   v4 (patch_size=4 -> 2, depths=(2,2,6)): at patch_size=4 the token grid
#      was only 8x8, giving Swin's windowing almost nothing to do (4
#      windows at stage 1, ONE window -- i.e. no windowing at all -- by
#      stage 3). patch_size=2 gives a real 16x16 grid with meaningful
#      multi-window attention at every stage. Best val jumped to 66.84%
#      (test accuracy 65.58%, vs. baseline's 66.48% test -- close, some
#      normal val/test variance expected given the 5,000-image val set).
#      Epoch time barely changed (~18.5-19s, same as before) -- the GPU
#      absorbed the extra token count well.
#   v5 (this version): still 3.2 points short of 70%, and the parameter
#      budget looked exhausted at v4 (13,154,590 vs a 13,391,151 ceiling --
#      only ~237K headroom). But stage 3 runs at 4x the base embedding dim
#      (384 channels), so its blocks are far more expensive than stage 1/2
#      blocks (96/192 channels) -- redistributing depth from stage 3 to
#      stages 1-2 buys much more total depth per parameter spent. Searched
#      depth combinations directly in code (not by hand) and found
#      depths=(7,5,5) is the deepest combination that still fits the
#      budget: 17 total blocks vs 10 before (+70% deeper), at 13,284,499
#      params (9.28%, inside the ceiling). Whether more depth actually
#      helps accuracy (vs. just being parameter-budget-feasible) is an
#      empirical question this run will answer.
#
# Only architecture-specific settings (model: section) differ from
# configs/vit_baseline.yaml -- everything in data:/training: below is
# byte-identical, unchanged, per "Experimental Controls".

model:
  name: swin
  input_resolution: 32
  patch_size: 2
  in_channels: 3
  window_size: 4
  embed_dim: 96
  num_stages: 3
  depths: [7, 5, 5]
  num_heads: [3, 6, 12]
  mlp_ratio: 4.5
  dropout: 0.05
  drop_path_rate: 0.1
  num_classes: 100

# Experimental controls shared with configs/vit_baseline.yaml -- both files
# must agree on everything below so the two runs are a fair comparison
# (Part 2, "Experimental Controls"). Unchanged from previous runs.
data:
  data_root: ./data
  random_seed: 705643
  randaugment_num_ops: 2
  randaugment_magnitude: 12
  random_crop_padding: 4
  mixup_cutmix_enabled: true
  mixup_alpha: 0.2
  cutmix_alpha: 1.0
  mixup_cutmix_prob: 0.5
  mixup_switch_prob: 0.5

training:
  batch_size: 256
  num_workers: 2
  random_seed: 705643
  epochs: 150
  optimizer: adamw
  learning_rate: 0.001
  weight_decay: 0.08
  lr_schedule: cosine
  warmup_epochs: 5
  label_smoothing: 0.1
  grad_clip_norm: 1.0
  mixed_precision: true
  checkpoint_dir: ./checkpoints/primary
  log_path: ./logs/primary_training.csv
  wandb_project: cifar100-vit-swin
  wandb_run_name: swin-primary